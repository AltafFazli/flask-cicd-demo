name: CI/CD Pipeline Level Up

# Tantangan 2 & 3: Tambahkan branch 'develop' dan tag 'v*' di trigger
on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test & Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout kode
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Jalankan unit test
      run: |
        pytest test_app.py -v

    # Tantangan 1: Keamanan (Security Scan dengan Trivy)
    - name: Run Trivy vulnerability scanner on fs
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        format: 'table'
        exit-code: '0' # Dibuat 0 agar pipeline tidak berhenti saat ada warning
        ignore-unfixed: true
        vuln-type: 'os,library'

  build-and-push:
    name: Build & Push ke Docker Hub
    runs-on: ubuntu-latest
    needs: test
    # Tantangan 3: Environment Berbeda (Hanya build jika push ke main atau nge-push Tag)
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Checkout kode
      uses: actions/checkout@v4
      
    - name: Login ke Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    # Tantangan 2: Automatisasi Versi (Semantic Tagging)
    - name: Build dan Push Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Menulis 2 tag: latest dan tag dari git (kalau ada)
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/flask-cicd-demo:latest
          ${{ secrets.DOCKER_USERNAME }}/flask-cicd-demo:${{ github.ref_name }}

  # Tantangan 4: Discord Notification
  notify:
    name: Kirim Notifikasi Discord
    runs-on: ubuntu-latest
    # Biar tetap jalan walaupun job test atau build gagal
    if: always() 
    needs: [test, build-and-push]
    steps:
    - name: Discord notification
      uses: Ilshidur/action-discord@master
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      with:
        args: 'Proses CI/CD untuk repositori ${{ github.repository }} telah selesai dengan status: ${{ job.status }}!'